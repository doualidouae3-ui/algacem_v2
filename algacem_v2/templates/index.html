<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Marginalia</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet"/>
<style>
/* ── Theme variables ─────────────────────────────────────────── */
:root {
  --bg:      #F5F0E8;
  --surf:    #EDE6D8;
  --surf2:   #E4DBCA;
  --surf3:   #D9CEB8;
  --brd:     #C9BFAA;
  --brdL:    #B8AA90;
  --txt:     #2C1A0E;
  --txtS:    #6B4F38;
  --txtF:    #A08870;
  --acc:     #5C2A1A;
  --accH:    #7A3822;
  --burg:    #8B1A2F;
  --burgL:   #A8243F;
  --choc:    #3D1F0F;
  --sel-hl:  rgba(139,26,47,.22);
}
.dark {
  --bg:      #1A1208;
  --surf:    #221808;
  --surf2:   #2C2010;
  --surf3:   #362818;
  --brd:     #4A3828;
  --brdL:    #5C4838;
  --txt:     #F0E8D8;
  --txtS:    #C0A888;
  --txtF:    #7A6050;
  --acc:     #C9A878;
  --accH:    #DFC090;
  --burg:    #C04060;
  --burgL:   #D85878;
  --choc:    #E8D0B0;
  --sel-hl:  rgba(201,168,120,.30);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden;background:var(--bg);transition:background .3s,color .3s}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--brdL);border-radius:3px}

.tl{position:absolute;left:0;top:0;width:100%;height:100%;overflow:hidden;line-height:1;user-select:text;pointer-events:none}
.tl span,.tl br{color:transparent;position:absolute;white-space:pre;cursor:text;transform-origin:0% 0%;pointer-events:all}
.tl ::selection{background:var(--sel-hl);color:transparent}
.tl ::-moz-selection{background:var(--sel-hl);color:transparent}

.hl-layer{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;overflow:hidden}
.hl-rect{position:absolute;border-radius:2px;pointer-events:auto;cursor:pointer;transition:opacity .15s}
.hl-rect:hover{opacity:.5!important}

.ed-body h1{font-size:2em;margin:.8em 0 .4em;font-weight:600;color:var(--txt);font-family:'Cormorant Garamond',Georgia,serif}
.ed-body h2{font-size:1.55em;margin:.7em 0 .35em;font-weight:600;color:var(--txt);font-family:'Cormorant Garamond',Georgia,serif}
.ed-body h3{font-size:1.25em;margin:.6em 0 .3em;font-weight:600;color:var(--txtS);font-family:'Cormorant Garamond',Georgia,serif}
.ed-body p{margin-bottom:.9em}
.ed-body blockquote{border-left:3px solid var(--burg);padding-left:1.3em;color:var(--txtS);font-style:italic;margin:1.4em 0;line-height:1.85}
.ed-body ul,.ed-body ol{padding-left:1.6em;margin-bottom:.9em}
.ed-body li{margin-bottom:.3em}
[contenteditable]:focus{outline:none}
[contenteditable]:empty::before{content:attr(data-ph);color:var(--brdL);pointer-events:none}

.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border-radius:8px;border:none;cursor:pointer;font-family:'Cormorant Garamond',Georgia,serif;font-size:15px;text-align:left;transition:all .15s;background:transparent;color:var(--txtS)}
.nav-btn:hover{background:var(--surf3)}
.nav-btn.active{background:var(--surf2);color:var(--burg)!important;font-weight:600}

.doc-item{padding:8px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;transition:background .15s}
.doc-item:hover{background:var(--surf2)}
.doc-item.active{background:var(--surf3)}

.lib-card{padding:22px 20px;border-radius:10px;border:1px solid var(--brd);background:var(--surf);cursor:pointer;transition:all .2s;min-height:150px;display:flex;flex-direction:column}
.lib-card:hover{border-color:var(--burg);background:var(--surf2)}

.tool-btn{padding:5px 11px;border-radius:6px;border:none;cursor:pointer;font-family:'Cormorant Garamond',Georgia,serif;font-size:14px;background:transparent;color:var(--txtF);transition:all .15s;line-height:1.4}
.tool-btn:hover{background:var(--surf3);color:var(--txt)}

.zoom-btn{padding:4px 10px;border-radius:6px;cursor:pointer;font-family:'Cormorant Garamond',Georgia,serif;font-size:12px;border:1px solid var(--brd);background:transparent;color:var(--txtF);transition:all .15s}
.zoom-btn:hover{border-color:var(--burg);color:var(--burg)}
.zoom-btn.active{background:var(--burg);color:#FFF5EE;border-color:var(--burg);font-weight:600}

.ann-item{margin:4px 10px;padding:12px 14px;border-radius:8px;border:1px solid transparent;transition:all .2s}
.ann-item.focused{background:var(--surf2)}

.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.upload-zone{padding:22px 20px;border-radius:10px;border:1px dashed var(--brdL);background:transparent;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:150px;gap:10px}
.upload-zone:hover,.upload-zone.drag{border-color:var(--burg);background:var(--surf2)}

.modal-bg{position:fixed;inset:0;background:rgba(44,26,14,.55);display:flex;align-items:center;justify-content:center;z-index:9999}
.dark .modal-bg{background:rgba(0,0,0,.72)}
.modal{background:var(--surf);border:1px solid var(--brdL);border-radius:14px;padding:28px;width:400px;box-shadow:0 24px 64px rgba(44,26,14,.18);animation:fadeIn .2s ease}
.dark .modal{box-shadow:0 32px 80px rgba(0,0,0,.7)}

.color-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;transition:transform .12s,box-shadow .12s;border:2.5px solid transparent;flex-shrink:0}
.color-dot.sel{transform:scale(1.18)}

.input-base{width:100%;background:var(--bg);border:1px solid var(--brd);border-radius:8px;color:var(--txt);font-family:'Cormorant Garamond',Georgia,serif;font-size:15px;padding:10px 13px;line-height:1.6;resize:none;transition:border-color .15s}
.input-base:focus{outline:none;border-color:var(--burg)}

.btn{font-family:'Cormorant Garamond',Georgia,serif;cursor:pointer;border:none;border-radius:8px;transition:all .15s;padding:8px 20px;font-size:14px}
.btn-ghost{background:transparent;color:var(--txtS);border:1px solid var(--brd)}
.btn-ghost:hover{border-color:var(--burg);color:var(--burg)}
.btn-acc{background:var(--burg);color:#FFF5EE;font-weight:600}
.btn-acc:hover{background:var(--burgL)}

/* theme toggle */
.theme-toggle{width:40px;height:22px;border-radius:11px;background:var(--surf3);border:1px solid var(--brdL);cursor:pointer;position:relative;transition:background .25s;flex-shrink:0}
.theme-toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--txtS);transition:transform .25s,background .25s}
.dark .theme-toggle::after{transform:translateX(18px);background:var(--acc)}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script>
/* ─── Storage (localStorage) ──────────────────────────────────────── */
const store = {
  get(k){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch{ return null; } },
  set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); return true; }catch(e){ console.warn('Storage error',e); return false; } },
  del(k){ try{ localStorage.removeItem(k); }catch{} }
};

/* PDF blobs can be large; we store them as separate keys */
const K = {
  docs:    'mg:docs',
  essays:  'mg:essays',
  pdf:     id => `mg:pdf:${id}`,
  hl:      id => `mg:hl:${id}`,
  essay:   id => `mg:essay:${id}`,
};

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

const HL_COLORS = [
  {id:'amber', bg:'rgba(215,158,55,.38)',  bd:'#D79E37', label:'Amber'},
  {id:'rose',  bg:'rgba(210,85,95,.36)',   bd:'#D25560', label:'Rose'},
  {id:'sage',  bg:'rgba(72,158,122,.36)',  bd:'#489E7A', label:'Sage'},
  {id:'iris',  bg:'rgba(140,104,200,.36)', bd:'#8C68C8', label:'Iris'},
];

/* Colors always in sync with current theme via CSS variables */
const _cv = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();
const C = new Proxy({},{
  get(_,k){
    const m={bg:'--bg',surf:'--surf',surf2:'--surf2',surf3:'--surf3',
      brd:'--brd',brdL:'--brdL',txt:'--txt',txtS:'--txtS',txtF:'--txtF',
      acc:'--acc',burg:'--burg',burgL:'--burgL'};
    return m[k]?_cv(m[k]):'#888';
  }
});
const F = "'Cormorant Garamond', Georgia, serif";

/* ─── React helpers ───────────────────────────────────────────────── */
const {useState, useEffect, useRef, useCallback, createElement: h} = React;

/* ─── Highlight Popup ─────────────────────────────────────────────── */
function HLPopup({txt, onConfirm, onCancel}){
  const [col, setCol] = useState('amber');
  const [note, setNote] = useState('');
  return h('div', {className:'modal-bg', onClick:e=>{ if(e.target===e.currentTarget) onCancel(); }},
    h('div', {className:'modal'},
      h('p', {style:{fontFamily:F, fontSize:12, color:C.txtF, letterSpacing:'.07em', textTransform:'uppercase', marginBottom:8}}, 'Highlighting'),
      h('p', {style:{fontFamily:F, fontSize:15, fontStyle:'italic', color:C.txtS, lineHeight:1.6, marginBottom:18,
        maxHeight:80, overflow:'hidden', borderLeft:`3px solid ${C.brdL}`, paddingLeft:12}},
        `"${txt.length>120 ? txt.slice(0,120)+'…' : txt}"`
      ),
      h('div', {style:{display:'flex', alignItems:'center', gap:10, marginBottom:18}},
        h('span', {style:{fontFamily:F, fontSize:12, color:C.txtF}}, 'Colour'),
        ...HL_COLORS.map(c =>
          h('div', {key:c.id, className:`color-dot${col===c.id?' sel':''}`,
            onClick:()=>setCol(c.id), title:c.label,
            style:{background:c.bg, boxShadow:col===c.id?`0 0 0 2px ${c.bd}`:undefined,
              borderColor:col===c.id?c.bd:'transparent'}})
        )
      ),
      h('textarea', {className:'input-base', rows:3, placeholder:'Annotation… (optional)',
        value:note, onChange:e=>setNote(e.target.value), style:{marginBottom:18}}),
      h('div', {style:{display:'flex', gap:8, justifyContent:'flex-end'}},
        h('button', {className:'btn btn-ghost', onClick:onCancel}, 'Cancel'),
        h('button', {className:'btn btn-acc', onClick:()=>onConfirm(col, note)}, 'Save highlight')
      )
    )
  );
}

/* ─── PDF Page ────────────────────────────────────────────────────── */
function PdfPage({pdfDoc, pageNum, scale, highlights, onSaveHL, onClickHL}){
  const pgRef = useRef(null);
  const cvRef = useRef(null);
  const tlRef = useRef(null);
  const taskRef = useRef(null);
  const [pending, setPending] = useState(null);

  useEffect(()=>{
    if(!pdfDoc || !cvRef.current) return;
    let dead = false;
    (async()=>{
      try{ if(taskRef.current) taskRef.current.cancel(); }catch{}
      const page = await pdfDoc.getPage(pageNum);
      if(dead) return;
      const vp = page.getViewport({scale});
      const cv = cvRef.current;
      cv.width = vp.width; cv.height = vp.height;
      taskRef.current = page.render({canvasContext: cv.getContext('2d'), viewport: vp});
      try{ await taskRef.current.promise; }catch{ return; }
      if(dead || !tlRef.current) return;
      const tl = tlRef.current;
      tl.innerHTML = '';
      tl.style.width = vp.width + 'px';
      tl.style.height = vp.height + 'px';
      const tc = await page.getTextContent();
      if(dead) return;
      try{
        const r = window.pdfjsLib.renderTextLayer({textContentSource:tc, container:tl, viewport:vp, textDivs:[]});
        if(r?.promise) await r.promise;
      }catch{
        try{ window.pdfjsLib.renderTextLayer({textContent:tc, container:tl, viewport:vp, textDivs:[]}); }catch{}
      }
    })();
    return()=>{ dead=true; };
  }, [pdfDoc, pageNum, scale]);

  function onMouseUp(){
    const sel = window.getSelection();
    if(!sel || sel.isCollapsed) return;
    const txt = sel.toString().trim();
    if(!txt || !pgRef.current) return;
    const base = pgRef.current.getBoundingClientRect();
    const rects = Array.from(sel.getRangeAt(0).getClientRects())
      .filter(r => r.width > 1 && r.height > 1)
      .map(r => ({
        top:   (r.top  - base.top)  / base.height * 100,
        left:  (r.left - base.left) / base.width  * 100,
        width:  r.width  / base.width  * 100,
        height: r.height / base.height * 100,
      }));
    if(rects.length) setPending({txt, rects});
  }

  function confirmHL(colorId, note){
    onSaveHL({id:uid(), page:pageNum, txt:pending.txt, rects:pending.rects, colorId, note, ts:Date.now()});
    setPending(null);
    window.getSelection()?.removeAllRanges();
  }

  const pageHLs = highlights.filter(h => h.page === pageNum);

  return h('div', {ref:pgRef, style:{position:'relative', lineHeight:0, display:'inline-block'}},
    h('canvas', {ref:cvRef, style:{display:'block'}}),
    h('div', {className:'hl-layer'},
      ...pageHLs.flatMap(hl => {
        const col = HL_COLORS.find(c=>c.id===hl.colorId) || HL_COLORS[0];
        return hl.rects.map((r,i) =>
          h('div', {key:`${hl.id}-${i}`, className:'hl-rect',
            onClick: ()=>onClickHL(hl.id),
            style:{top:r.top+'%', left:r.left+'%', width:r.width+'%', height:r.height+'%',
              background:col.bg, borderBottom:`2px solid ${col.bd}`}})
        );
      })
    ),
    h('div', {ref:tlRef, className:'tl', onMouseUp}),
    pending && h(HLPopup, {txt:pending.txt, onConfirm:confirmHL, onCancel:()=>{ setPending(null); window.getSelection()?.removeAllRanges(); }})
  );
}

/* ─── PDF Viewer ──────────────────────────────────────────────────── */
function PdfViewer({doc, pdfReady}){
  const [pdf, setPdf] = useState(null);
  const [numPg, setNumPg] = useState(0);
  const [scale, setScale] = useState(1.4);
  const [hls, setHls] = useState([]);
  const [busy, setBusy] = useState(true);

  useEffect(()=>{
    if(!pdfReady || !doc) return;
    setBusy(true); setPdf(null); setNumPg(0);
    const stored = store.get(K.hl(doc.id)) || [];
    setHls(stored);
    const b64 = doc._data || store.get(K.pdf(doc.id));
    if(!b64){ setBusy(false); return; }
    try{
      const bin = atob(b64);
      const arr = new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
      window.pdfjsLib.getDocument({data:arr}).promise.then(p=>{
        setPdf(p); setNumPg(p.numPages); setBusy(false);
      }).catch(e=>{ console.error(e); setBusy(false); });
    }catch(e){ console.error(e); setBusy(false); }
  }, [doc?.id, pdfReady]);

  function saveHL(hl){
    const next = [...hls, hl];
    setHls(next);
    store.set(K.hl(doc.id), next);
    document.dispatchEvent(new CustomEvent('mg:hlupdate', {detail:next}));
  }
  function clickHL(id){
    document.dispatchEvent(new CustomEvent('mg:focus', {detail:id}));
  }

  if(busy) return h(Center, null, h('p', {style:{fontFamily:F,fontSize:16,fontStyle:'italic',color:C.txtF}}, 'Loading manuscript…'));
  if(!pdf)  return h(Center, null,
    h('div', {style:{textAlign:'center'}},
      h('p', {style:{fontFamily:F,fontSize:16,fontStyle:'italic',color:C.txtS,marginBottom:8}}, 'PDF not found in local storage.'),
      h('p', {style:{fontFamily:F,fontSize:13,color:C.txtF}}, 'Please re-upload from the Library tab.')
    )
  );

  return h('div', {style:{flex:1, display:'flex', flexDirection:'column', overflow:'hidden'}},
    /* zoom bar */
    h('div', {style:{display:'flex', gap:4, padding:'8px 16px', borderBottom:`1px solid ${C.brd}`,
      background:C.surf, flexShrink:0, justifyContent:'center', alignItems:'center', flexWrap:'wrap'}},
      ...[0.8,1.0,1.2,1.4,1.6,1.8,2.0].map(s =>
        h('button', {key:s, className:`zoom-btn${scale===s?' active':''}`, onClick:()=>setScale(s)},
          Math.round(s*100)+'%')
      ),
      h('div', {style:{width:1,height:14,background:C.brd,margin:'0 6px'}}),
      h('span', {style:{fontFamily:F,fontSize:12,color:C.txtF,fontStyle:'italic'}},
        numPg + (numPg===1?' page':' pages'))
    ),
    /* pages */
    h('div', {style:{flex:1, overflow:'auto', padding:'32px 0', background:C.bg}},
      h('div', {style:{display:'flex', flexDirection:'column', alignItems:'center', gap:20}},
        ...Array.from({length:numPg},(_,i)=>i+1).map(n =>
          h('div', {key:n, style:{boxShadow:'0 8px 48px rgba(0,0,0,.7)', borderRadius:2}},
            h(PdfPage, {pdfDoc:pdf, pageNum:n, scale, highlights:hls, onSaveHL:saveHL, onClickHL:clickHL})
          )
        )
      )
    )
  );
}

/* ─── Annotations Panel ───────────────────────────────────────────── */
function AnnotationsPanel({docId}){
  const [hls, setHls] = useState([]);
  const [focused, setFocused] = useState(null);

  useEffect(()=>{
    setHls(store.get(K.hl(docId)) || []);
    const upd = e => setHls(e.detail);
    const foc = e => setFocused(e.detail);
    document.addEventListener('mg:hlupdate', upd);
    document.addEventListener('mg:focus', foc);
    return()=>{
      document.removeEventListener('mg:hlupdate', upd);
      document.removeEventListener('mg:focus', foc);
    };
  }, [docId]);

  function del(id){
    const next = hls.filter(h=>h.id!==id);
    setHls(next);
    store.set(K.hl(docId), next);
    document.dispatchEvent(new CustomEvent('mg:hlupdate', {detail:next}));
  }

  return h('div', {style:{width:290, borderLeft:`1px solid ${C.brd}`, background:C.surf,
    display:'flex', flexDirection:'column', flexShrink:0}},
    h('div', {style:{padding:'15px 18px', borderBottom:`1px solid ${C.brd}`, flexShrink:0,
      display:'flex', alignItems:'center', justifyContent:'space-between'}},
      h('span', {style:{fontFamily:F,fontSize:11,color:C.txtF,letterSpacing:'.09em',textTransform:'uppercase'}}, 'Annotations'),
      h('span', {style:{fontFamily:F,fontSize:13,color:C.txtS}}, hls.length)
    ),
    h('div', {style:{flex:1, overflow:'auto', padding:'6px 0'}},
      hls.length === 0
        ? h('div', {style:{padding:'36px 18px', textAlign:'center'}},
            h('div', {style:{fontSize:28,marginBottom:12,opacity:.35,color:C.acc}}, '✦'),
            h('p', {style:{fontFamily:F,fontSize:14,fontStyle:'italic',color:C.txtF,lineHeight:1.7}},
              'Select text in the PDF to begin annotating')
          )
        : hls.map(hl => {
            const col = HL_COLORS.find(c=>c.id===hl.colorId) || HL_COLORS[0];
            const isFoc = focused === hl.id;
            return h('div', {key:hl.id, className:`ann-item${isFoc?' focused':''}`,
              style:{border:`1px solid ${isFoc?col.bd:'transparent'}`}},
              h('div', {style:{borderLeft:`3px solid ${col.bd}`, paddingLeft:10,
                fontFamily:F, fontSize:14, fontStyle:'italic', color:'#D0C9BA', lineHeight:1.65, marginBottom:6}},
                `"${hl.txt.length>130 ? hl.txt.slice(0,130)+'…' : hl.txt}"`
              ),
              h('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center'}},
                h('span', {style:{fontSize:11,color:C.txtF,fontFamily:F}},
                  `p.${hl.page} · ${new Date(hl.ts).toLocaleDateString()}`),
                h('button', {onClick:()=>del(hl.id),
                  style:{background:'none',border:'none',color:C.txtF,cursor:'pointer',fontSize:17,padding:'0 4px',lineHeight:1}}, '×')
              ),
              hl.note && h('p', {style:{marginTop:8,fontFamily:F,fontSize:13,color:C.txtS,lineHeight:1.6,
                borderTop:`1px solid ${C.brd}`,paddingTop:8}}, hl.note)
            );
          })
    )
  );
}

/* ─── Essay Editor ────────────────────────────────────────────────── */
function EssayEditor({essay, onUpdate}){
  const titleRef = useRef(null);
  const bodyRef  = useRef(null);
  const timer    = useRef(null);
  const [saved, setSaved] = useState(true);

  useEffect(()=>{
    if(!essay) return;
    if(titleRef.current) titleRef.current.textContent = essay.title || '';
    const body = store.get(K.essay(essay.id)) || '';
    if(bodyRef.current) bodyRef.current.innerHTML = body;
    setSaved(true);
  }, [essay?.id]);

  function schedSave(){
    setSaved(false);
    clearTimeout(timer.current);
    timer.current = setTimeout(()=>{
      if(!essay || !titleRef.current || !bodyRef.current) return;
      const t = titleRef.current.textContent.trim() || 'Untitled essay';
      store.set(K.essay(essay.id), bodyRef.current.innerHTML);
      onUpdate(essay.id, t);
      setSaved(true);
    }, 900);
  }

  function exec(cmd, val){ document.execCommand(cmd, false, val||null); bodyRef.current?.focus(); schedSave(); }

  const tools = [
    {l:'B',     cmd:'bold',        title:'Bold'},
    {l:'I',     cmd:'italic',      title:'Italic', s:{fontStyle:'italic'}},
    {l:'U',     cmd:'underline',   title:'Underline', s:{textDecoration:'underline'}},
    null,
    {l:'H1',    cmd:'formatBlock', val:'h1', title:'Heading 1'},
    {l:'H2',    cmd:'formatBlock', val:'h2', title:'Heading 2'},
    {l:'"',     cmd:'formatBlock', val:'blockquote', title:'Blockquote', s:{fontStyle:'italic'}},
    {l:'¶',     cmd:'formatBlock', val:'p', title:'Paragraph'},
    null,
    {l:'—',     cmd:'insertText',  val:'—', title:'Em dash'},
    {l:'·',     cmd:'insertUnorderedList', title:'List'},
  ];

  if(!essay) return h(Center, null,
    h('div', {style:{textAlign:'center'}},
      h('div', {style:{fontSize:38,marginBottom:16,opacity:.2,color:C.acc}}, '✎'),
      h('p', {style:{fontFamily:F,fontSize:18,fontStyle:'italic',color:C.txtF,marginBottom:8}}, 'No essay selected'),
      h('p', {style:{fontFamily:F,fontSize:14,color:C.txtF}}, 'Create one from the sidebar')
    )
  );

  return h('div', {style:{flex:1, display:'flex', flexDirection:'column', overflow:'hidden'}},
    /* toolbar */
    h('div', {style:{display:'flex', gap:2, padding:'7px 16px', borderBottom:`1px solid ${C.brd}`,
      background:C.surf, flexShrink:0, alignItems:'center', flexWrap:'wrap'}},
      ...tools.map((t,i) =>
        t === null
          ? h('div', {key:'sep'+i, style:{width:1,height:16,background:C.brd,margin:'0 4px'}})
          : h('button', {key:t.cmd+(t.val||''), className:'tool-btn', title:t.title,
              onMouseDown:e=>{ e.preventDefault(); exec(t.cmd, t.val); },
              style:t.s||{}}, t.l)
      ),
      h('div', {style:{flex:1}}),
      h('span', {style:{fontFamily:F,fontSize:12,color:saved?C.txtF:C.acc,fontStyle:'italic',transition:'color .3s'}},
        saved ? 'saved' : 'saving…')
    ),
    /* writing area */
    h('div', {style:{flex:1, overflow:'auto', padding:'56px 0', background:C.bg}},
      h('div', {style:{maxWidth:700, margin:'0 auto', padding:'0 52px'}},
        h('div', {ref:titleRef, contentEditable:true, suppressContentEditableWarning:true,
          'data-ph':'Untitled essay',
          onInput:schedSave,
          style:{fontFamily:F, fontSize:38, fontWeight:600, color:C.txt, lineHeight:1.2,
            marginBottom:30, borderBottom:`1px solid ${C.brd}`, paddingBottom:22}}),
        h('div', {ref:bodyRef, contentEditable:true, suppressContentEditableWarning:true,
          className:'ed-body',
          'data-ph':'Begin writing. The page is yours.',
          onInput:schedSave,
          style:{fontFamily:F, fontSize:20, color:'#CEC6B7', lineHeight:1.9, minHeight:500}})
      )
    )
  );
}

/* ─── Library ─────────────────────────────────────────────────────── */
function LibraryView({docs, onOpen, onRemove}){
  const fRef = useRef(null);
  const [drag, setDrag] = useState(false);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  async function processFile(file){
    if(!file || !file.name.toLowerCase().endsWith('.pdf')){ setErr('Please upload a PDF file.'); return; }
    setLoading(true); setErr('');
    const buf = await file.arrayBuffer();
    const bin = new Uint8Array(buf).reduce((s,b)=>s+String.fromCharCode(b),'');
    const b64 = btoa(bin);
    const id = uid();
    const meta = {id, name:file.name.replace(/\.pdf$/i,''), ts:Date.now(), size:file.size};
    const ok = store.set(K.pdf(id), b64);
    if(!ok) setErr('PDF may be too large to persist; it will work this session only.');
    setLoading(false);
    onOpen({...meta, _data:b64});
  }

  function onFile(e){ if(e.target.files[0]) processFile(e.target.files[0]); e.target.value=''; }
  function onDrop(e){ e.preventDefault(); setDrag(false); if(e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); }

  return h('div', {style:{flex:1, overflow:'auto', padding:'52px 48px', background:C.bg}, className:'fade-in'},
    h('h1', {style:{fontFamily:F,fontSize:36,fontWeight:600,color:C.txt,marginBottom:6}}, 'Library'),
    h('p', {style:{fontFamily:F,fontSize:17,fontStyle:'italic',color:C.txtS,marginBottom:48}},
      'Your private reading collection'),
    h('div', {style:{display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))', gap:16, maxWidth:980}},
      /* upload card */
      h('div', {className:`upload-zone${drag?' drag':''}`,
        onClick:()=>fRef.current?.click(),
        onDragOver:e=>{ e.preventDefault(); setDrag(true); },
        onDragLeave:()=>setDrag(false),
        onDrop},
        loading
          ? h('p', {style:{fontFamily:F,fontSize:14,fontStyle:'italic',color:C.txtF}}, 'Processing…')
          : [
              h('span', {key:'ico', style:{fontSize:28,color:C.txtF,lineHeight:1,opacity:.7}}, '+'),
              h('span', {key:'txt', style:{fontFamily:F,fontSize:14,fontStyle:'italic',color:C.txtF}}, 'Upload PDF'),
              h('span', {key:'sub', style:{fontFamily:F,fontSize:11,color:C.txtF,opacity:.6}}, 'or drag & drop')
            ]
      ),
      /* doc cards */
      ...docs.map(d =>
        h('div', {key:d.id, className:'lib-card',
          onClick:()=>onOpen(d)},
          h('div', {style:{fontSize:26,marginBottom:12,opacity:.7}}, '📄'),
          h('div', {style:{fontFamily:F,fontSize:16,fontWeight:600,color:C.txt,lineHeight:1.35,
            flex:1,marginBottom:10}}, d.name),
          h('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:'auto'}},
            h('span', {style:{fontFamily:F,fontSize:11,color:C.txtF}},
              new Date(d.ts).toLocaleDateString()),
            h('button', {
              onClick:e=>{ e.stopPropagation(); onRemove(d.id); },
              style:{background:'none',border:'none',color:C.txtF,cursor:'pointer',
                fontSize:18,padding:'0 4px',lineHeight:1,transition:'color .15s'},
              onMouseEnter:e=>e.target.style.color=C.txtS,
              onMouseLeave:e=>e.target.style.color=C.txtF
            }, '×')
          )
        )
      )
    ),
    err && h('p', {style:{fontFamily:F,fontSize:13,color:'#D25560',marginTop:16,fontStyle:'italic'}}, err),
    h('input', {ref:fRef, type:'file', accept:'.pdf', onChange:onFile, style:{display:'none'}})
  );
}

/* ─── Center helper ───────────────────────────────────────────────── */
function Center({children}){
  return h('div', {style:{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}}, children);
}

/* ─── Dashboard ───────────────────────────────────────────────────── */
function Dashboard({docs, essays, onOpenDoc, onOpenEssay, onNewEssay}){
  const totalHL = docs.reduce((sum,d)=>{ const h=store.get(K.hl(d.id)); return sum+(h?h.length:0); },0);

  const stat = (n,label) => h('div', {style:{textAlign:'center'}},
    h('div', {style:{fontFamily:F,fontSize:46,fontWeight:600,color:C.acc,lineHeight:1.1}}, n),
    h('div', {style:{fontFamily:F,fontSize:13,color:C.txtF,marginTop:4,letterSpacing:'.06em',textTransform:'uppercase'}}, label)
  );

  return h('div', {style:{flex:1,overflow:'auto',padding:'52px 48px',background:C.bg}, className:'fade-in'},
    h('h1', {style:{fontFamily:F,fontSize:36,fontWeight:600,color:C.txt,lineHeight:1.1,marginBottom:4}}, 'Marginalia'),
    h('p', {style:{fontFamily:F,fontSize:17,fontStyle:'italic',color:C.txtS,marginBottom:48}},
      'Your private space to read, annotate, and write.'),

    /* stats */
    h('div', {style:{display:'flex',gap:40,marginBottom:52,flexWrap:'wrap'}},
      stat(docs.length,   'documents'),
      stat(totalHL,       'highlights'),
      stat(essays.length, 'essays'),
    ),

    /* recent docs */
    docs.length > 0 && h('div', {style:{marginBottom:44}},
      h('p', {style:{fontFamily:F,fontSize:12,color:C.txtF,letterSpacing:'.09em',textTransform:'uppercase',marginBottom:14}},
        'Recent reading'),
      h('div', {style:{display:'flex',flexDirection:'column',gap:2}},
        ...docs.slice().sort((a,b)=>b.ts-a.ts).slice(0,5).map(d => {
          const hlCount = (store.get(K.hl(d.id))||[]).length;
          return h('div', {key:d.id,
            onClick:()=>onOpenDoc(d),
            style:{display:'flex',alignItems:'center',padding:'11px 14px',borderRadius:8,
              cursor:'pointer',transition:'background .15s',gap:12},
            onMouseEnter:e=>e.currentTarget.style.background=C.surf2,
            onMouseLeave:e=>e.currentTarget.style.background='transparent'},
            h('span', {style:{fontSize:18,opacity:.7}}, '📄'),
            h('span', {style:{fontFamily:F,fontSize:15,color:C.txt,flex:1}}), d.name,
            hlCount > 0 && h('span', {style:{fontFamily:F,fontSize:12,color:C.txtF,fontStyle:'italic'}},
              hlCount + (hlCount===1?' highlight':' highlights'))
          );
        })
      )
    ),

    /* recent essays */
    essays.length > 0 && h('div', {},
      h('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}},
        h('p', {style:{fontFamily:F,fontSize:12,color:C.txtF,letterSpacing:'.09em',textTransform:'uppercase'}},
          'Recent writing'),
        h('button', {onClick:onNewEssay,
          style:{fontFamily:F,fontSize:13,color:C.acc,background:'none',border:'none',cursor:'pointer',
            padding:'4px 0',textDecoration:'none',transition:'opacity .15s'}},
          '+ New essay')
      ),
      h('div', {style:{display:'flex',flexDirection:'column',gap:2}},
        ...essays.slice().sort((a,b)=>b.ts-a.ts).slice(0,5).map(e =>
          h('div', {key:e.id,
            onClick:()=>onOpenEssay(e),
            style:{display:'flex',alignItems:'center',padding:'11px 14px',borderRadius:8,
              cursor:'pointer',transition:'background .15s',gap:12},
            onMouseEnter:ev=>ev.currentTarget.style.background=C.surf2,
            onMouseLeave:ev=>ev.currentTarget.style.background='transparent'},
            h('span', {style:{fontSize:18,opacity:.7}}, '✎'),
            h('span', {style:{fontFamily:F,fontSize:15,color:C.txt,flex:1}}, e.title),
            h('span', {style:{fontFamily:F,fontSize:12,color:C.txtF}},
              new Date(e.ts).toLocaleDateString())
          )
        )
      )
    ),

    /* empty state */
    docs.length===0 && essays.length===0 && h('div', {style:{marginTop:16}},
      h('p', {style:{fontFamily:F,fontSize:15,fontStyle:'italic',color:C.txtF,lineHeight:1.75,maxWidth:480,marginBottom:24}},
        'Begin by uploading a PDF in the Library tab. Highlight passages, add annotations, then write.'),
      h('button', {
        onClick:()=>document.dispatchEvent(new CustomEvent('mg:gotab',{detail:'library'})),
        className:'btn btn-acc'
      }, 'Go to Library →')
    )
  );
}

/* ─── App ─────────────────────────────────────────────────────────── */
function App(){
  const [pdfReady,  setPdfReady]  = useState(false);
  const [tab,       setTab]       = useState('home');
  const [docs,      setDocs]      = useState([]);
  const [curDoc,    setCurDoc]    = useState(null);
  const [essays,    setEssays]    = useState([]);
  const [curEssay,  setCurEssay]  = useState(null);
  const [annOpen,   setAnnOpen]   = useState(true);
  const [dark,      setDark]      = useState(()=> store.get('mg:dark') || false);

  useEffect(()=>{
    document.documentElement.classList.toggle('dark', dark);
    store.set('mg:dark', dark);
  }, [dark]);

  /* load PDF.js */
  useEffect(()=>{
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload = ()=>{
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      setPdfReady(true);
    };
    document.head.appendChild(s);
  }, []);

  /* load persisted metadata */
  useEffect(()=>{
    setDocs(store.get(K.docs) || []);
    setEssays(store.get(K.essays) || []);
  }, []);

  useEffect(()=>{
    const go = e => setTab(e.detail);
    document.addEventListener('mg:gotab', go);
    return () => document.removeEventListener('mg:gotab', go);
  }, []);

  async function openDoc(meta){
    if(!docs.find(d=>d.id===meta.id)){
      const nd = [...docs, {id:meta.id, name:meta.name, ts:meta.ts, size:meta.size}];
      setDocs(nd); store.set(K.docs, nd);
    }
    setCurDoc(meta); setTab('reader');
  }
  function removeDoc(id){
    const nd = docs.filter(d=>d.id!==id);
    setDocs(nd); store.set(K.docs, nd);
    if(curDoc?.id===id) setCurDoc(null);
  }
  function newEssay(){
    const e = {id:uid(), title:'Untitled essay', ts:Date.now()};
    const ne = [...essays, e];
    setEssays(ne); store.set(K.essays, ne);
    setCurEssay(e); setTab('essays');
  }
  function openEssay(e){ setCurEssay(e); setTab('essays'); }
  function updEssay(id, title){
    const ne = essays.map(e=>e.id===id ? {...e,title,ts:Date.now()} : e);
    setEssays(ne); store.set(K.essays, ne);
    if(curEssay?.id===id) setCurEssay(ne.find(e=>e.id===id));
  }
  function removeEssay(id){
    const ne = essays.filter(e=>e.id!==id);
    setEssays(ne); store.set(K.essays, ne);
    if(curEssay?.id===id) setCurEssay(null);
  }

  const nav = [
    {id:'home',    icon:'◇', label:'Home'},
    {id:'library', icon:'○', label:'Library'},
    {id:'reader',  icon:'◑', label:'Reader'},
    {id:'essays',  icon:'✎', label:'Essays'},
  ];

  return h('div', {style:{display:'flex', height:'100vh', background:'var(--bg)', color:'var(--txt)', overflow:'hidden', fontFamily:F}},

    /* ── SIDEBAR ── */
    h('div', {style:{width:232, background:C.surf, borderRight:`1px solid ${C.brd}`, display:'flex', flexDirection:'column', flexShrink:0}},

      /* logo */
      h('div', {style:{padding:'18px 18px 16px', borderBottom:`1px solid ${C.brd}`, display:'flex', alignItems:'center', justifyContent:'space-between'}},
        h('div', null,
          h('div', {style:{fontSize:22, fontWeight:700, color:C.burg, lineHeight:1, letterSpacing:'.01em'}}, 'Marginalia'),
          h('div', {style:{fontSize:12, color:C.txtF, fontStyle:'italic', marginTop:5}}, 'private reading & writing')
        ),
        h('div', {style:{display:'flex',flexDirection:'column',alignItems:'center',gap:3}},
          h('button', {className:'theme-toggle', title: dark?'Switch to light':'Switch to dark',
            onClick:()=>setDark(d=>!d)}),
          h('span', {style:{fontFamily:F,fontSize:9,color:C.txtF,letterSpacing:'.04em'}}, dark?'dark':'light')
        )
      ),

      /* nav */
      h('div', {style:{padding:'10px 8px', borderBottom:`1px solid ${C.brd}`, flexShrink:0}},
        ...nav.map(n =>
          h('button', {key:n.id, className:`nav-btn${tab===n.id?' active':''}`,
            style:{color: tab===n.id ? C.burg : C.txtS},
            onClick:()=>setTab(n.id)},
            h('span', {style:{fontSize:12,lineHeight:1,flexShrink:0}}, n.icon),
            n.label
          )
        )
      ),

      /* list pane */
      h('div', {style:{flex:1, overflow:'auto', padding:'10px 8px'}},
        tab === 'essays'
          ? h('div', null,
              h('div', {style:{padding:'2px 12px 8px', fontSize:11, color:C.txtF, letterSpacing:'.08em', textTransform:'uppercase'}}, 'Essays'),
              ...essays.map(e =>
                h('div', {key:e.id, className:`doc-item${curEssay?.id===e.id?' active':''}`,
                  onClick:()=>openEssay(e)},
                  h('div', {style:{flex:1, overflow:'hidden'}},
                    h('div', {style:{fontSize:13, color:curEssay?.id===e.id?C.txt:C.txtS,
                      overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}, e.title),
                    h('div', {style:{fontSize:11, color:C.txtF, marginTop:2}},
                      new Date(e.ts).toLocaleDateString())
                  ),
                  h('button', {onClick:ev=>{ev.stopPropagation();removeEssay(e.id);},
                    style:{background:'none',border:'none',color:C.txtF,cursor:'pointer',
                      fontSize:17,padding:'0 0 0 8px',lineHeight:1,flexShrink:0}}, '×')
                )
              ),
              h('button', {onClick:newEssay,
                style:{width:'100%',padding:'8px 12px',marginTop:4,background:'transparent',
                  border:`1px dashed ${C.brdL}`,color:C.txtF,fontFamily:F,fontSize:13,
                  cursor:'pointer',borderRadius:8,transition:'all .15s',textAlign:'center'}},
                '+ New essay')
            )
          : h('div', null,
              h('div', {style:{padding:'2px 12px 8px', fontSize:11, color:C.txtF, letterSpacing:'.08em', textTransform:'uppercase'}}, 'Documents'),
              ...docs.map(d =>
                h('div', {key:d.id, className:`doc-item${curDoc?.id===d.id?' active':''}`,
                  onClick:()=>openDoc(d)},
                  h('span', {style:{fontSize:13,color:curDoc?.id===d.id?C.txt:C.txtS,
                    overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}, d.name),
                  h('button', {onClick:e=>{e.stopPropagation();removeDoc(d.id);},
                    style:{background:'none',border:'none',color:C.txtF,cursor:'pointer',
                      fontSize:17,padding:'0 0 0 8px',lineHeight:1,flexShrink:0}}, '×')
                )
              ),
              docs.length===0 && h('p', {style:{padding:'8px 12px',fontFamily:F,fontSize:13,fontStyle:'italic',color:C.txtF}}, 'No documents yet')
            )
      ),

      /* annotation toggle */
      tab==='reader' && curDoc && h('div', {style:{padding:'10px 8px', borderTop:`1px solid ${C.brd}`, flexShrink:0}},
        h('button', {onClick:()=>setAnnOpen(o=>!o),
          style:{width:'100%',padding:'8px 12px',background:annOpen?C.surf3:'transparent',
            border:`1px solid ${C.brd}`,color:annOpen?C.acc:C.txtS,fontFamily:F,fontSize:13,
            cursor:'pointer',borderRadius:8,transition:'all .15s',display:'flex',
            alignItems:'center',gap:8,justifyContent:'center'}},
          h('span', {style:{fontSize:12}}, '◧'),
          annOpen ? 'Hide annotations' : 'Show annotations'
        )
      )
    ),

    /* ── MAIN ── */
    h('div', {style:{flex:1, display:'flex', overflow:'hidden'}},
      tab==='home'    && h(Dashboard, {docs, essays, onOpenDoc:openDoc, onOpenEssay:openEssay, onNewEssay:newEssay}),
      tab==='library' && h(LibraryView, {docs, onOpen:openDoc, onRemove:removeDoc}),
      tab==='reader'  && !curDoc && h(Center, null,
        h('div', {style:{textAlign:'center'}},
          h('div', {style:{fontSize:36,marginBottom:16,opacity:.2,color:C.acc}}, '◑'),
          h('p', {style:{fontFamily:F,fontSize:18,fontStyle:'italic',color:C.txtF,marginBottom:8}}, 'No document open'),
          h('p', {style:{fontFamily:F,fontSize:14,color:C.txtF}}, 'Go to the Library and upload a PDF')
        )
      ),
      tab==='reader' && curDoc && h(PdfViewer, {key:curDoc.id, doc:curDoc, pdfReady}),
      tab==='reader' && curDoc && annOpen && h(AnnotationsPanel, {key:curDoc.id+'a', docId:curDoc.id}),
      tab==='essays'  && h(EssayEditor, {essay:curEssay, onUpdate:updEssay})
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
